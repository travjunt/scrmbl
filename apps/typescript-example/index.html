<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scrmbl — vanilla TS example</title>
    <style>
      body {
        background: #08090a;
        color: #e8eaed;
        font-family: ui-monospace, Menlo, monospace;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      main { text-align: center; }
      h1 { font-size: 42px; letter-spacing: -0.02em; }
      button {
        font: inherit;
        color: #51f0a8;
        background: none;
        border: 1px solid #1d2124;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        margin: 4px;
      }
      [data-scrmbl-cell][data-glyph] { color: #51f0a8; opacity: 0.55; }
    </style>
  </head>
  <body>
    <main>
      <h1 id="headline">HELLO, VANILLA</h1>
      <button id="next">next phrase</button>
      <button id="replay">replay</button>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
